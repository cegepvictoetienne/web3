  ]},
  {"Exercices" = [
    {"TypeScript" = [
    {"Typescript et lodash" = "exercices/typescript/lodash.md"},
    {"TypeScript 2 et JS asynchrone" = "exercices/typescript/typescript_async.md"},
    ]},
    {"React" = [
    {"Introduction à React" = "exercices/react/react_intro.md"},
    {"Penser en React et Mécanique de React" = "exercices/react/react_penser_mecanique.md"},
    {"React et les styles" = "exercices/react/react_styles.md"},
