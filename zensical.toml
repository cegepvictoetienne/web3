    {"Next.js - Routage" = "exercices/nextjs/next_routage.md"},
    {"Next.js - Server et Client Components" = "exercices/nextjs/next_composantes.md"},
    {"Next.js - Modes de rendu" = "exercices/nextjs/next_modes_rendu.md"},
    {"Next.js - Hydratation" = "exercices/nextjs/next_hydratation.md"},
    {"Next.js - API Routes" = "exercices/nextjs/next_api_routes.md"},
