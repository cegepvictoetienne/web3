    ]},
    {"Outils" = [
      {"Immer" = "lecons/outils/immer.md"},
    ]},
    {"Next.js" = [
      {"Introduction à Next.js" = "lecons/next.js/introduction.md"},
      {"Routage" = "lecons/next.js/routage.md"},
      {"Server et Client Components" = "lecons/next.js/composantes.md"},
      {"Modes de rendu" = "lecons/next.js/modes_rendu.md"},
      {"Hydratation" = "lecons/next.js/hydratation.md"},
      {"API Routes" = "lecons/next.js/api_routes.md"},
